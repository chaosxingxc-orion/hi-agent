[project]
name = "hi-agent"
version = "0.1.0"
description = "TRACE enterprise agent implementation"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "agent-kernel @ git+https://github.com/chaosxingxc-orion/agent-kernel.git@ff4d25c7e90cd2e2e0e62acb4cf929b0b77eca08",
  "httpx>=0.28",
  "starlette>=0.37",
  "uvicorn[standard]>=0.29",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "pytest-asyncio>=1.0",
  "pytest-cov>=6.0",
  "respx>=0.23",
  "ruff>=0.8",
]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
markers = [
    "integration: integration tests using real components",
]

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["hi_agent", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "C4", "SIM", "RUF", "D"]
ignore = ["D203", "D213"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.coverage.run]
source = ["hi_agent"]
branch = true
omit = [
    "hi_agent/__main__.py",
    "hi_agent/samples/*",
]

[tool.coverage.report]
show_missing = true
fail_under = 65
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "\\.\\.\\.",
]
