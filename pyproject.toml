[project]
name = "hi-agent"
version = "0.1.0"
description = "TRACE enterprise agent implementation"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "agent-kernel @ git+https://github.com/chaosxingxc-orion/agent-kernel.git@8f08e648c4cd28685c48795ff6bfe0a0d40a2850",
  "httpx>=0.28",
  "starlette>=0.37",
  "uvicorn[standard]>=0.29",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "pytest-asyncio>=1.0",
  "respx>=0.23",
  "ruff>=0.8",
]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["hi_agent", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "C4", "SIM", "RUF", "D"]
ignore = ["D203", "D213"]

[tool.ruff.lint.pydocstyle]
convention = "google"
