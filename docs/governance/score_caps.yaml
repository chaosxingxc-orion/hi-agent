# docs/governance/score_caps.yaml
# Single source of truth for score cap rules.
# Priority: lowest cap wins when multiple conditions apply.
# Conditions are evaluated in the order listed; first match sets the cap.
# Factor names appear in manifest cap_factors list.
#
# scope: which tiers this cap applies to.
#   current_verified_readiness — the primary release-readiness tier
#   seven_by_twenty_four_operational_readiness — 7×24 production tier
#   architecture_readiness — code/architecture maturity
#   (all: applies to all tiers)
#
# ── 7x24 readiness model (W28+ with W31-L L-12'/L-13' correction) ─────────
#
# 7x24 operational readiness is a property of the architecture, not solely a
# deliverable of engineering work. The platform either has the architectural
# primitives required for continuous operation (sync_bridge, observable
# lifecycle, cancellation contract, typed event spine, runtime-coupled
# chaos) or it does not. There is no separate "make it 7x24" workstream.
#
# Static rule: `architectural_seven_by_twenty_four`.
# It evaluates 5 architectural assertions emitted by `scripts/run_arch_7x24.py`
# (a static check that runs in seconds, not a 24h wall-clock soak):
#
#   1. cross_loop_stability     -- sync_bridge persistent loop wired
#   2. lifespan_observable      -- runner maintains current_stage
#   3. cancellation_round_trip  -- cancel route returns 200 live + 404 unknown
#   4. spine_provenance_real    -- RunEventEmitter records provenance
#   5. chaos_runtime_coupled_all -- all chaos scenarios runtime-coupled
#
# The static rule is scoped exclusively to the
# seven_by_twenty_four_operational_readiness tier.
#
# W31-L (L-12'/L-13' correction): soak evidence is also visible to the
# `current_verified_readiness` tier via the new `soak_evidence_not_real`
# cap rule. Previously W28 fully retired the wall-clock-soak cap from
# current_verified_readiness AND excluded soak_evidence from
# `_ARCH_CONSTRAINT_GATES`'s gate_fail scope, so a real FAIL on soak did
# NOT affect current_verified_readiness — that gap is what the W28 errata
# names "metric redefinition, not measurement". The L-12'/L-13' fix
# re-introduces a SINGLE cap_factor (`soak_evidence_not_real`) on the
# verified tier so a missing-or-non-real soak evidence is reflected, but
# does not require a wall-clock-24h soak (it is satisfied by a real 1h
# soak with provenance:real per scripts/run_soak.py).
#
# Double-count protection: build_release_manifest.py keeps
# _ARCH_CONSTRAINT_GATES (observability_spine_completeness,
# chaos_runtime_coupling) excluded from the generic gate_warn / gate_fail /
# gate_missing scans on current_verified_readiness. soak_evidence is
# REMOVED from _ARCH_CONSTRAINT_GATES (W31-L L-12') so a FAIL on soak
# affects current_verified_readiness via gate_fail; the new
# `soak_evidence_not_real` rule covers the missing/non-real case.
# ──────────────────────────────────────────────────────────────────────────
schema_version: "2"

cap_rules:
  - condition: head_mismatch
    cap: 55
    factor: head_mismatch
    scope: [current_verified_readiness, architecture_readiness]
    description: "Manifest release_head does not match current HEAD"
  - condition: notice_inconsistency
    cap: 55
    factor: notice_inconsistency
    scope: [current_verified_readiness, architecture_readiness]
    description: "Delivery notice Functional HEAD does not match current HEAD or manifest head"
  - condition: clean_env_not_final_head
    cap: 60
    factor: clean_env_not_final_head
    scope: [current_verified_readiness]
    description: "Latest clean-env evidence artifact is not tied to the final release HEAD"
  - condition: operator_drill_missing
    cap: 75
    factor: operator_drill_missing
    scope: [current_verified_readiness]
    description: "No real operator drill evidence found for the current HEAD"
  - condition: dirty_worktree
    cap: 70
    factor: dirty_worktree
    scope: [current_verified_readiness, architecture_readiness]
    description: "Working tree has uncommitted changes"
  - condition: gate_fail
    cap: 70
    factor: gate_fail
    scope: [current_verified_readiness, architecture_readiness]
    description: "One or more gates failed"
  - condition: expired_allowlist
    cap: 63
    factor: expired_allowlist
    scope: [current_verified_readiness, architecture_readiness]
    description: "Expired allowlist entries present"
  - condition: clean_env_unverified
    cap: 63
    factor: clean_env_unverified
    scope: [current_verified_readiness]
    description: "clean_env gate missing or failed"
  - condition: t3_stale
    cap: 63
    factor: t3_stale
    scope: [current_verified_readiness]
    description: "T3 evidence is stale or missing"
  - condition: t3_deferred
    cap: 72
    factor: t3_deferred
    scope: [current_verified_readiness]
    description: "T3 gate deferred (real LLM key not available)"
  - condition: t3_shape_verified
    cap: 72
    factor: t3_shape_verified
    scope: [current_verified_readiness]
    description: "T3 gate passed only in mock-shape mode (provenance:structural)"
  - condition: verification_stale
    cap: 68
    factor: verification_stale
    scope: [current_verified_readiness]
    description: "Verification artifacts are stale vs current HEAD"
  - condition: gate_missing
    cap: 70
    factor: gate_missing
    scope: [current_verified_readiness, architecture_readiness]
    description: "One or more gate scripts not found"
  - condition: release_identity_fail
    cap: 50
    factor: release_identity_fail
    scope: [current_verified_readiness, architecture_readiness]
    description: "check_release_identity.py failed — repo/manifest/notice heads do not agree"
  - condition: verification_artifact_missing_at_head
    cap: 55
    factor: verification_artifact_missing_at_head
    scope: [current_verified_readiness]
    description: "Required verification artifacts missing for current HEAD"
  - condition: clean_env_artifact_missing_at_head
    cap: 55
    factor: clean_env_artifact_missing_at_head
    scope: [current_verified_readiness]
    description: "No clean-env artifact exists for the current HEAD"
  - condition: score_artifact_inconsistent
    cap: 55
    factor: score_artifact_inconsistent
    scope: [current_verified_readiness, architecture_readiness]
    description: "Score artifact filename, manifest_id, and verified_head are not internally consistent"
  - condition: gate_warn
    cap: 80
    factor: gate_warn
    scope: [current_verified_readiness]
    description: "One or more gates warn or are deferred (but not failed)"
  - condition: provenance_unknown_or_synthetic
    cap: 67
    factor: provenance_unknown_or_synthetic
    scope: [current_verified_readiness, seven_by_twenty_four_operational_readiness]
    description: "Evidence consumed by gate has unknown or synthetic provenance"
  # ── 7x24: static (always) + soak (W31-L L-12'/L-13' correction) ─────────
  # The old soak_24h_missing / soak_24h_pending wall-clock caps and the
  # single-purpose observability_spine_incomplete / chaos_non_runtime_coupled
  # caps are RETIRED. The static architectural rule remains scoped to the
  # 7x24 tier. The L-12'/L-13' correction adds a soak-evidence cap to the
  # verified tier (re-introduced after W28 retirement without paired
  # evidence rule). Evidence: docs/verification/<sha>-arch-7x24.json (static)
  # and docs/verification/<sha>-soak-{1h,24h}.json (soak).
  - condition: architectural_seven_by_twenty_four
    cap: 90
    factor: architectural_seven_by_twenty_four
    scope: [seven_by_twenty_four_operational_readiness]
    description: "One or more architectural 7x24 assertions failed (see assertions list)"
    assertions:
      - cross_loop_stability
      - lifespan_observable
      - cancellation_round_trip
      - spine_provenance_real
      - chaos_runtime_coupled_all
    lifecycle_note: "Single 7x24 rule (W28+). Cap=90 (small signal, not a draconian penalty). Cap clears when <sha>-arch-7x24.json shows 5/5 PASS. Run via scripts/run_arch_7x24.py."
  - condition: soak_evidence_not_real
    cap: 75
    factor: soak_evidence_not_real
    scope: [current_verified_readiness]
    description: "Latest soak evidence has provenance != 'real' or is missing for current HEAD"
    lifecycle_note: "W31-L (L-12'/L-13'): re-introduces a soak-evidence cap on the verified tier. Cap=75 (significant, not draconian). Cap clears when scripts/run_soak.py emits <sha>-soak-{1h,24h}.json with provenance:real for the current HEAD. The W28 errata records why this rule is necessary: cap retirement without paired-evidence rule was the root cause of the verified=94.55 metric redefinition."
  - condition: expired_allowlist_accepted_as_pass
    cap: 70
    factor: expired_allowlist_accepted
    scope: [architecture_readiness, current_verified_readiness]
    description: "Expired allowlist still accepted by gate"

  # ── Multistatus boundary-gate cap (W23-A) ─────────────────────────────────
  #
  # Rule 14 / W23-A: replaces the old `multistatus_gates_deferred` cap (which
  # held verified at 80 whenever ANY of the 9 boundary gates were single-path
  # advisory). The new rule is parameterized by the `defer_count` reported by
  # `scripts/_governance/multistatus_runner.py --all --json`:
  #
  #   defer_count == 0      → no cap (multistatus rule does not match)
  #   defer_count in 1..3   → cap 92  (some debt, ship-ok)
  #   defer_count >= 4      → cap 80  (significant debt; same as old behaviour)
  #
  # `build_release_manifest.py` reads `defer_count` from a fresh runner
  # invocation; the cap is applied only when defer_count >= 1. A FAIL among
  # those gates is still ship-blocking via the existing `gate_fail` rule.
  - condition: multistatus_gates_pending_high
    cap: 80
    factor: multistatus_pending_high
    scope: [current_verified_readiness, architecture_readiness]
    description: "≥4 boundary multistatus gates still in DEFER (debt high; cap 80)"
  - condition: multistatus_gates_pending_low
    cap: 92
    factor: multistatus_pending_low
    scope: [current_verified_readiness, architecture_readiness]
    description: "1–3 boundary multistatus gates still in DEFER (debt low; cap 92)"
