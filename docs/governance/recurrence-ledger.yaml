    code_fix: "W17-A1-A9: removed 'released' from exemption regexes in check_doc_consistency.py; restricted _GOVERNANCE_PREFIXES to ('docs/',) in check_verification_artifacts.py, check_manifest_freshness.py, build_release_manifest.py; NOTE: continue-on-error on spine/soak/chaos gates NOT removed in W17 -- deferred to W18-C1; 3 sites remain in release-gate.yml"
