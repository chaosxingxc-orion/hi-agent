    process_change: "Governance Freeze policy for W17: no new --allow-* flags; any gate-pass via exemption must be self-documented in recurrence-ledger.yaml within the same PR"
    owner: GOV
    expiry_or_followup: "2026-06-01"
    evidence_artifact: "scripts/check_doc_consistency.py, scripts/check_verification_artifacts.py (diff W17 vs W16)"
    current_closure_level: operationally_observable
