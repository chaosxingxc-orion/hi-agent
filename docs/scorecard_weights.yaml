# Wave 16 scorecard weights — human-curated, must sum to 100.
# base_score: current implementation quality (0–100, human-assessed).
# weight: contribution to final raw score.
# gate_check: primary governance script that validates this dimension.
#
# raw = sum(weight * base_score / 100)  across all dimensions
# verified = min(raw, gate_cap)
#   gate_cap: driven by docs/governance/score_caps.yaml registry
#
# Update base_score when implementation state changes.
# Bump version when dimensions or weights change.
# INVARIANT: sum(weight) MUST equal 100. CI fails on violation.

schema_version: "2"
wave: "Wave 20"

dimensions:
  - name: layering
    description: "Platform code does not import from lower-stability layers (examples/tests/scripts/docs)"
    weight: 5
    base_score: 100
    gate_check: layering

  - name: vocab_discipline
    description: "No domain vocabulary leaking into hi_agent/ public surface (hard bans clean; soft-ban allowlisted)"
    weight: 5
    base_score: 85
    gate_check: no_research_vocab

  - name: waiver_hygiene
    description: "All time-bounded waivers are tracked; none are past their expiry wave"
    weight: 5
    base_score: 100
    gate_check: expired_waivers

  - name: doc_drift
    description: "Documentation references only symbols that exist and are not deprecated"
    weight: 5
    base_score: 100
    gate_check: doc_canonical

  - name: linter_quality
    description: "Rule 6/13 governance signal-to-noise: FPs suppressed; remaining sites are real defects"
    weight: 4
    base_score: 97
    gate_check: rules

  - name: test_markers
    description: "Integration tests carry correct pytest markers; profile filters are functional"
    weight: 7
    base_score: 97
    gate_check: wave_tags

  - name: governance_readability
    description: "All governance scripts emit machine-readable --json; wave-tag regex catches bare Wave N"
    weight: 5
    base_score: 100
    gate_check: wave_tags

  - name: evidence_identity
    description: "Gate evidence files carry verified_head SHA, timestamp, and dirty-worktree guard"
    weight: 7
    base_score: 100
    gate_check: evidence_identity

  - name: claim_discipline
    description: "Downstream notices bind claims to release manifest IDs"
    weight: 7
    base_score: 90
    gate_check: doc_consistency

  - name: t3_gate
    description: "Real-LLM operator-shape gate passed at current HEAD (Rule 8 T3 Invariance)"
    weight: 7
    base_score: 95
    gate_check: t3_freshness

  - name: clean_env
    description: "Default-offline profile completes without failures in a clean environment"
    weight: 9
    base_score: 94
    gate_check: clean_env

  - name: ci_gate
    description: "Release-gate CI job aggregates all governance checks non-skippably (W14-G)"
    weight: 4
    base_score: 88
    gate_check: gate_strictness

  - name: allowlist_discipline
    description: "All allowlist entries have owner/risk/reason/expiry/replacement-test; none expired"
    weight: 3
    base_score: 92
    gate_check: allowlist_discipline

  - name: metrics_cardinality
    description: "All named metrics have real producer callsites"
    weight: 4
    base_score: 85
    gate_check: metrics_cardinality

  - name: slo_health
    description: "SLO/alerts/runbook/dashboard HTTP routes pass health check"
    weight: 4
    base_score: 85
    gate_check: slo_health

  - name: verification_artifacts
    description: "Verification and delivery artifacts are current at release HEAD"
    weight: 4
    base_score: 84
    gate_check: verification_artifacts

  - name: targeted_default_path
    description: "Critical default-path integration tests pass (run lease, progress events, liveness, DLQ, backpressure, drain, metrics catalogue)"
    weight: 6
    base_score: 80
    gate_check: targeted_default_path

  - name: soak_24h_evidence
    description: "24-hour soak evidence present with provenance:real and duration>=86400s"
    weight: 3
    base_score: 0
    gate_check: soak_evidence

  - name: observability_spine
    description: "All 14 observability layers correlate by run_id + trace_id with provenance:real"
    weight: 3
    base_score: 64
    gate_check: observability_spine_completeness

  - name: chaos_runtime_coupling
    description: "All chaos scenarios are runtime-coupled (real hi_agent serve subprocess)"
    weight: 3
    base_score: 75
    gate_check: chaos_runtime_coupling

# Three-tier score structure (per upstream conduct spec §6)
# raw_implementation_maturity:               sum(weight * base_score / 100)
# current_verified_readiness:                min(raw, gate_cap)
# seven_by_twenty_four_operational_readiness: min(raw, tier-specific caps for soak/spine/chaos)
# conditional_readiness_after_blockers:       raw (cap removed if blockers cleared)
tiers:
  raw_implementation_maturity: true
  current_verified_readiness: true
  seven_by_twenty_four_operational_readiness: true
  conditional_readiness_after_blockers: true
