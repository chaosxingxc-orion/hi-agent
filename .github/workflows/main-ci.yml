name: CI
on:
  push:
    branches: [main, "fix/**", "feat/**", "claude/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      VOLCES_API_KEY: ${{ secrets.VOLCE_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Materialize llm_config.local.json from secret (optional override)
        if: ${{ env.VOLCES_API_KEY != '' }}
        run: python scripts/inject_provider_key.py --provider volces
      - name: Lint (blocking - syntax + imports)
        run: ruff check hi_agent tests --select E9,F63,F7,F82
      - name: Lint (blocking - full ruleset, Rule 12 Lint Cleanliness)
        run: ruff check hi_agent tests
      - name: Unit & root tests
        run: pytest tests/ --ignore=tests/integration --ignore=tests/security --ignore=tests/contract -q --tb=short
      - name: Security tests
        run: python -m pytest tests/security/ -q --tb=short
      - name: Contract tests
        run: python -m pytest tests/contract/ -q --tb=short
      - name: Integration tests
        run: python -m pytest tests/integration/ -q -m "not live_api and not prod_e2e" --tb=short --timeout=60
      - name: Live API tests (optional secrets)
        continue-on-error: true
        if: ${{ env.VOLCES_API_KEY != '' }}
        run: python -m pytest tests/integration/test_live_llm_api.py -q -m live_api --tb=short --timeout=120
      - name: Production E2E tests (optional secrets)
        if: ${{ env.OPENAI_API_KEY != '' || env.ANTHROPIC_API_KEY != '' }}
        run: python -m pytest tests/integration/test_prod_e2e.py -q -m prod_e2e --tb=short --timeout=120
      - name: Coverage (unit + integration)
        run: pytest tests/ --ignore=tests/security --ignore=tests/contract -m "not live_api and not prod_e2e" --cov=hi_agent --cov-report=term-missing --cov-fail-under=50 --timeout=120 -p no:unraisableexception
