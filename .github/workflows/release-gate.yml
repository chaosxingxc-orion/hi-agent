name: Release Gate (W17-G)

# Consolidated non-skippable release gate �?enforces all governance checks and
# produces a versioned manifest artifact. Deferred gates use continue-on-error: true.
#
# Runs after every push to main/fix/feat/claude branches and on every PR to main.
# T3 invariance (t3_freshness) checks the docs/delivery/ evidence committed in the
# repo; it will fail if hot-path files changed since the last recorded gate run.
# Clean-env and real-LLM gate runs are operator-performed and committed to docs/delivery/
# before release; see docs/clean-env-verification.md and CLAUDE.md Rule 8.

on:
  push:
    branches: [main, "fix/**", "feat/**", "claude/**"]
  pull_request:
    branches: [main]

jobs:
  release-gate:
    name: Release Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      # --- Security scan (blocking — must run before anything else) ---

      - name: Secret scan (W16-Q)
        run: python scripts/check_secrets.py --json

      # --- Static analysis ---

      - name: Lint (ruff full)
        run: ruff check hi_agent agent_kernel agent_server scripts tests

      - name: Check CLAUDE.md rules (Rule 6 / 13 AST)
        run: python scripts/check_rules.py --json

      # --- Governance gate checks ---

      - name: Check platform layering (Class L)
        run: python scripts/check_layering.py --json

      - name: Check research vocabulary (Class V)
        run: python scripts/check_no_research_vocab.py --json

      - name: Check route tenant scope
        run: python scripts/check_route_scope.py --json

      - name: Check expired waivers (Class W)
        run: python scripts/check_expired_waivers.py --json

      - name: Check wave tags in source (Class W)
        run: python scripts/check_no_wave_tags.py --json

      - name: Check doc canonical symbols (Class D)
        run: python scripts/check_doc_canonical_symbols.py --json

      - name: Check doc consistency (Class C / Check 9)
        run: python scripts/check_doc_consistency.py --json

      - name: Check boundary (platform / kernel)
        run: python scripts/check_boundary.py --json

      - name: Check deprecated field usage
        run: python scripts/check_deprecated_field_usage.py --json

      - name: Check durable backend wiring
        run: python scripts/check_durable_wiring.py --json

      # --- W14-A1: Previously absent gates now in CI ---

      - name: Check allowlist discipline (W14-A1)
        run: python scripts/check_allowlist_discipline.py --json

      - name: Check metrics cardinality (W14-A1)
        run: python scripts/check_metrics_cardinality.py --json

      - name: Check SLO health (W14-A1)
        run: python scripts/check_slo_health.py --json

      - name: Check targeted default path (W14-A1)
        run: python scripts/check_targeted_default_path.py --json

      - name: Check verification artifacts (W14-A1)
        # TODO: promote to blocking in W29 once verify-on-functional-HEAD lands.
        # The release-gate workflow runs against `git rev-parse HEAD`, which is
        # always one commit past any locally-committed artifact (the artifact-
        # commit itself moves HEAD). --allow-docs-only-gap accepts artifacts
        # whose head is a docs/scripts/.github-only ancestor of HEAD, which is
        # the right semantics for this workflow.
        run: python scripts/check_verification_artifacts.py --json --allow-docs-only-gap

      - name: Check validate-before-mutate (W14-A1)
        run: python scripts/check_validate_before_mutate.py --json

      - name: Check select completeness (W14-A1)
        run: python scripts/check_select_completeness.py --json

      - name: Check silent degradation (W14-A1)
        run: python scripts/check_silent_degradation.py --json

      - name: Check metric producers (W14-A1)
        run: python scripts/check_metric_producers.py --json

      # --- W14 new gates ---

      - name: Check evidence provenance (W14-B2)
        run: python scripts/check_evidence_provenance.py --json

      - name: Check allowlist universal (W14-D3)
        run: python scripts/check_allowlist_universal.py --json

      - name: Check noqa discipline (W14-D4)
        run: python scripts/check_noqa_discipline.py --json

      - name: Check pytest skip discipline (W14-D5)
        run: python scripts/check_pytest_skip_discipline.py --json

      - name: Check closure taxonomy (W14-D8)
        run: python scripts/check_closure_taxonomy.py --json

      - name: Check multi-status gates (W14-D9)
        run: python scripts/check_multistatus_gates.py --json

      - name: Check no hardcoded wave strings (W14-A4)
        run: python scripts/check_no_hardcoded_wave.py --json

      - name: Check observability spine completeness (W14-B8)
        run: python scripts/check_observability_spine_completeness.py --json

      - name: Check contract spine completeness (W23-D / Rule 12)
        run: python scripts/check_contract_spine_completeness.py --json

      - name: Check soak evidence (W14-C2)
        run: python scripts/check_soak_evidence.py --json

      - name: Check chaos runtime coupling (W14-C4)
        run: python scripts/check_chaos_runtime_coupling.py --json

      # --- T3 invariance (Rule 8) ---
      # Fails if hot-path files changed since the last recorded gate run in docs/delivery/.
      # To clear: run scripts/run_t3_gate.py --provider volces locally and commit evidence.

      - name: Check T3 evidence freshness (Rule 8)
        run: python scripts/check_t3_freshness.py

      # Untracked-artifacts check must run before check_score_cap, which writes
      # <ci-merge-sha>-score-cap.json to docs/verification/ as a side effect.
      # Those files use the CI merge-commit SHA so cannot be pre-committed.
      - name: Untracked release artifacts (W17-B13)
        run: python scripts/check_untracked_release_artifacts.py --json

      - name: Check score cap (W14-A7)
        run: python scripts/check_score_cap.py --json

      # --- W16 new gates ---

      - name: Manifest freshness (W16-A8)
        # TODO: promote to blocking in W29 once CI generates+commits the
        # manifest in a single atomic step (same migration as release_identity).
        # --allow-docs-only-gap: same exemption as the release_identity step
        # below. The manifest commit is itself a docs-only follow-on after the
        # functional commit (the manifest filename and contents both live under
        # docs/releases/). Without this flag, every push that ships a fresh
        # manifest would fail manifest_freshness on the next push because
        # HEAD has moved past the manifest's release_head.
        run: python scripts/check_manifest_freshness.py --json --allow-docs-only-gap

      - name: Release identity (W16-A8)
        # TODO: promote to blocking in W29 once manifest commit is atomic at release HEAD.
        # Manifest is generated at the functional commit but committed in a docs-only
        # follow-on; --allow-docs-only-gap is the right exemption (same as verification
        # artifacts check above). Promotion target: W29 when CI generates+commits manifest
        # in a single atomic step. Tracked in recurrence-ledger.yaml as W28-E.
        run: python scripts/check_release_identity.py --json --allow-docs-only-gap

      - name: Recurrence ledger (W16-G3)
        run: python scripts/check_recurrence_ledger.py --json

      - name: Operator drill evidence (W16-H4)
        run: python scripts/check_operator_drill.py --json

      - name: Test honesty audit (W16-K)
        run: python scripts/check_test_honesty.py --json

      # --- W17 anti-loop gates ---

      - name: Wave label consistency (W17-B11)
        run: python scripts/check_wave_consistency.py --json

      - name: Manifest rewrite budget (W17-B19)
        run: python scripts/check_manifest_rewrite_budget.py --json

      - name: Doc freshness + response sibling (W19-E4)
        run: python scripts/check_doc_truth.py --json

      - name: Check gate strictness (W21-AX-D)
        run: python scripts/check_gate_strictness.py --strict --json

      # --- W21 orphan gates wired (AX-D D11–D18) ---

      - name: check-async-init-resources (W21-AX-D)
        run: python scripts/check_async_init_resources.py --strict --json

      - name: check-capability-maturity (W21-AX-D)
        run: python scripts/check_capability_maturity.py --strict --json

      - name: check-conftest-fallback-scope (W21-AX-D)
        run: python scripts/check_conftest_fallback_scope.py --strict

      - name: check-downstream-response-format (W21-AX-D)
        run: python scripts/check_downstream_response_format.py

      - name: check-posture-coverage (W21-AX-D)
        run: python scripts/check_posture_coverage.py --strict --json

      - name: check-spine-completeness (W21-AX-D)
        run: python scripts/check_spine_completeness.py --strict --json

      - name: check-sqlite-pragma (W21-AX-D)
        run: python scripts/check_sqlite_pragma.py --strict --json

      - name: check-agent-kernel-pin (W21-AX-D)
        run: python scripts/check_agent_kernel_pin.py --json

      - name: check-vacuous-asserts (W21-AX-D)
        run: python scripts/check_vacuous_asserts.py --json

      - name: check-route-coverage (W21-AX-D)
        run: python scripts/check_route_coverage.py --json

      - name: check-state-transition-coverage (W21-AX-D)
        run: python scripts/check_state_transition_coverage.py --json

      - name: check-owner-tag (W21-AX-D)
        run: python scripts/check_owner_tag.py --n 20

      - name: check-clean-env (W21-AX-D)
        run: python scripts/check_clean_env.py --json

      - name: check-pytest-markers (W21-AX-D)
        run: python scripts/check_pytest_markers.py --json

      - name: check-evidence-identity (W21-AX-D)
        run: python scripts/check_evidence_identity.py --json
        # identity check is production-hardened in W27

      # --- W22 new gates ---

      # --- W23 new gates ---

      - name: Rule 7 closure on LLM hot path (W23-B)
        run: python scripts/check_rule7_observability.py --json

      # --- W25-C: Rule 1 / 2 / 9 mechanical enforcement ---

      - name: Check root-cause block (Rule 1)
        run: python scripts/check_root_cause_block.py --json

      - name: Check surgical changes (Rule 2)
        run: python scripts/check_surgical_changes.py --json

      - name: Check self-audit completeness (Rule 9)
        run: python scripts/check_self_audit.py --json

      # --- W23-A: multistatus boundary-gate runner ---
      # Replaces the 9 separate W22-A5 / W22-A10 invocations. The runner
      # invokes every boundary gate with --json, parses the multistatus
      # output, fails the job if any gate returns FAIL, and emits an
      # aggregated summary (pass/fail/warn/defer counts + per-gate detail).
      # build_release_manifest.py re-runs the runner to compute the
      # multistatus_pending_count cap factor.
      #
      # Covers: contract_freeze (R-AS-3), contracts_purity (R-AS-7),
      # facade_loc (R-AS-8), no_domain_types (R-AS-2), no_reverse_imports
      # (R-AS-1), route_tenant_context (R-AS-4), tdd_evidence (R-AS-5),
      # state_transition_centralization, score_artifact_consistency (W22-A10).

      - name: Multistatus boundary gates (W23-A)
        id: multistatus-runner
        run: |
          python -m scripts._governance.multistatus_runner --all --json | tee multistatus-results.json

      - name: Upload multistatus runner results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: multistatus-results-${{ github.sha }}
          path: multistatus-results.json
          retention-days: 90

      # --- W28 new gates (GOV-C) ---

      - name: Check closure levels (Rule 15 / W28-GOV-C)
        run: python scripts/check_closure_levels.py --json

      - name: Check manifest budget (Rule 14 / W28-GOV-C)
        run: python scripts/check_manifest_budget.py --json

      # --- W25 new gates ---

      - name: Check notice/manifest score honesty (Rule 14, W25-N)
        run: python scripts/check_notice_score_match.py --json

      # --- Release manifest ---

      - name: Build release manifest
        run: python scripts/build_release_manifest.py --output manifest.json

      - name: Upload release manifest artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-manifest-${{ github.sha }}
          path: manifest.json
          retention-days: 90
