name: CI
on:
  push:
    branches: [main, "fix/**", "feat/**", "claude/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Verify agent-kernel pin (latest main)
        run: python scripts/check_agent_kernel_pin.py
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint (blocking)
        run: ruff check hi_agent tests --select E9,F63,F7,F82
      - name: Lint (advisory)
        continue-on-error: true
        run: ruff check hi_agent tests --statistics
      - name: Unit & root tests
        run: pytest tests/ --ignore=tests/integration --ignore=tests/security --ignore=tests/contract -q --tb=short
      - name: Security tests
        run: python -m pytest tests/security/ -q --tb=short
      - name: Contract tests
        run: python -m pytest tests/contract/ -q --tb=short
      - name: Integration tests
        run: python -m pytest tests/integration/ -q --tb=short --timeout=60
      - name: Coverage (unit + integration)
        run: pytest tests/ --ignore=tests/security --ignore=tests/contract --cov=hi_agent --cov-report=term-missing --cov-fail-under=50 --timeout=60
