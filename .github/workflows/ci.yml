name: CI
on:
  push:
    branches: [main, "fix/**", "feat/**", "claude/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      VOLCE_API_KEY: ${{ secrets.VOLCE_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint (blocking — syntax + imports)
        run: ruff check hi_agent tests --select E9,F63,F7,F82
      - name: Lint (blocking — full ruleset, Rule 12 Lint Cleanliness)
        # Rule 12: zero findings against the repo's pyproject.toml ruleset.
        # Per-occurrence exceptions must use inline `# noqa: <CODE> — <why>`
        # with a one-line justification. Blanket `# noqa` is rejected.
        run: ruff check hi_agent tests
      - name: Unit & root tests
        run: pytest tests/ --ignore=tests/integration --ignore=tests/security --ignore=tests/contract -q --tb=short
      - name: Security tests
        run: python -m pytest tests/security/ -q --tb=short
      - name: Contract tests
        run: python -m pytest tests/contract/ -q --tb=short
      - name: Integration tests
        run: python -m pytest tests/integration/ -q -m "not live_api and not prod_e2e" --tb=short --timeout=60
      - name: Live API tests (optional secrets)
        # Rule 10: live-LLM latency is flaky by nature. Treat as advisory
        # rather than blocking so external model jitter cannot block a merge.
        continue-on-error: true
        if: ${{ env.VOLCE_API_KEY != '' }}
        run: python -m pytest tests/integration/test_live_llm_api.py -q -m live_api --tb=short --timeout=120
      - name: Production E2E tests (optional secrets)
        # Rule 9: gate only on secrets the fixture actually consumes.
        # test_prod_e2e.py's server fixture calls build_llm_gateway() which
        # reads OPENAI_API_KEY / ANTHROPIC_API_KEY (not VOLCE_API_KEY), so
        # triggering this step on VOLCE_API_KEY alone produces a 503 and
        # breaks the job. Drop VOLCE from the condition.
        if: ${{ env.OPENAI_API_KEY != '' || env.ANTHROPIC_API_KEY != '' }}
        run: python -m pytest tests/integration/test_prod_e2e.py -q -m prod_e2e --tb=short --timeout=120
      - name: Coverage (unit + integration)
        run: pytest tests/ --ignore=tests/security --ignore=tests/contract -m "not live_api and not prod_e2e" --cov=hi_agent --cov-report=term-missing --cov-fail-under=50 --timeout=120 -p no:unraisableexception
