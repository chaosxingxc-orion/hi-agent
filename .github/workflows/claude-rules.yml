name: CLAUDE.md Rule Enforcement (blocking)
on:
  pull_request:
  push:
    branches: [main, 'claude/**']

jobs:
  check-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run CLAUDE.md rule checks
        run: python scripts/check_rules.py --verbose
      - name: Summary
        if: always()
        run: |
          echo "::notice::This workflow is BLOCKING. DF-44 closed the known agent_kernel/ violations."

  rule15-structural:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install package
        run: python -m pip install -e .[dev]
      - name: Run structural Rule 15 gate
        run: >
          python scripts/rule15_structural_gate.py
          --port 8094
          --fake-llm-port 19094
          --output docs/delivery/ci-rule15-structural.json
          --poll-timeout 60
          --ready-timeout 60

  boundary-check:
    runs-on: ubuntu-latest
    continue-on-error: true  # Remove after Tracks B3 + G2 land
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check kernel/platform boundary
        run: python scripts/check_boundary.py

  t3-evidence-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check T3 evidence on hot-path changes
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD > /tmp/changed_files.txt
          python scripts/check_t3_evidence.py \
            --changed-files /tmp/changed_files.txt \
            --pr-body "$PR_BODY"
